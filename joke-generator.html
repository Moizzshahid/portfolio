<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Joke Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    .subtitle {
      color: #666;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .joke-box {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 5px solid #667eea;
    }

    .joke-text {
      font-size: 1.1rem;
      color: #333;
      line-height: 1.6;
      font-weight: 500;
    }

    .loading {
      color: #667eea;
      font-style: italic;
    }

    .joke-category {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-bottom: 15px;
      margin-top: 10px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex: 1;
      min-width: 200px;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      min-width: 150px;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-secondary:active {
      background: #d0d0d0;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #e74c3c;
      background: #fadbd8;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    .joke-type {
      font-size: 0.85rem;
      color: #999;
      margin-top: 15px;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .button-group {
        flex-direction: column;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>😂 Joke Generator</h1>
    <p class="subtitle">Click the button to get a random joke</p>

    <div class="error-message" id="errorMessage"></div>

    <div class="joke-box">
      <div class="joke-text" id="jokeText">
        <span class="loading">Click "Get Joke" to start laughing! 🚀</span>
      </div>
    </div>

    <div id="categoryBox" style="display: none;">
      <span class="joke-category" id="categoryTag"></span>
      <div class="joke-type" id="jokeType"></div>
    </div>

    <div class="button-group">
      <button class="btn-primary" id="getJokeBtn" onclick="getJoke()">Get Joke</button>
      <button class="btn-secondary" onclick="getJokeByCategory()">Random Category</button>
    </div>
  </div>

  <script>
    // List of joke categories from JokeAPI
    const categories = ['General', 'Programming', 'Knock-Knock'];

    // Function to fetch a random joke
    async function getJoke() {
      const btn = document.getElementById('getJokeBtn');
      const jokeText = document.getElementById('jokeText');
      const errorMsg = document.getElementById('errorMessage');
      const categoryBox = document.getElementById('categoryBox');

      btn.disabled = true;
      jokeText.innerHTML = '<span class="loading">Loading joke... ⏳</span>';
      errorMsg.classList.remove('show');

      try {
        const response = await fetch('https://v2.jokeapi.dev/joke/Any');

        if (!response.ok) {
          throw new Error('Failed to fetch joke');
        }

        const data = await response.json();

        // Display the joke based on type
        if (data.type === 'single') {
          jokeText.innerHTML = `<span>${data.joke}</span>`;
          document.getElementById('jokeType').textContent = 'Type: Single Joke';
        } else if (data.type === 'twopart') {
          jokeText.innerHTML = `
            <span>
              <strong>Setup:</strong> ${data.setup}<br><br>
              <strong>Punchline:</strong> ${data.delivery}
            </span>
          `;
          document.getElementById('jokeType').textContent = 'Type: Two-Part Joke';
        }

        // Display category
        document.getElementById('categoryTag').textContent = data.category;
        categoryBox.style.display = 'block';

      } catch (error) {
        jokeText.innerHTML = '<span class="loading">Oops! Could not fetch joke 😢</span>';
        errorMsg.textContent = `Error: ${error.message}. Please try again.`;
        errorMsg.classList.add('show');
      } finally {
        btn.disabled = false;
      }
    }

    // Function to get joke by random category
    async function getJokeByCategory() {
      const randomCategory = categories[Math.floor(Math.random() * categories.length)];
      const btn = document.getElementById('getJokeBtn');
      const jokeText = document.getElementById('jokeText');
      const errorMsg = document.getElementById('errorMessage');
      const categoryBox = document.getElementById('categoryBox');

      btn.disabled = true;
      jokeText.innerHTML = `<span class="loading">Fetching ${randomCategory} joke... ⏳</span>`;
      errorMsg.classList.remove('show');

      try {
        const response = await fetch(`https://v2.jokeapi.dev/joke/${randomCategory}`);

        if (!response.ok) {
          throw new Error('Failed to fetch joke');
        }

        const data = await response.json();

        // Display the joke
        if (data.type === 'single') {
          jokeText.innerHTML = `<span>${data.joke}</span>`;
          document.getElementById('jokeType').textContent = 'Type: Single Joke';
        } else if (data.type === 'twopart') {
          jokeText.innerHTML = `
            <span>
              <strong>Setup:</strong> ${data.setup}<br><br>
              <strong>Punchline:</strong> ${data.delivery}
            </span>
          `;
          document.getElementById('jokeType').textContent = 'Type: Two-Part Joke';
        }

        // Display category
        document.getElementById('categoryTag').textContent = randomCategory;
        categoryBox.style.display = 'block';

      } catch (error) {
        jokeText.innerHTML = '<span class="loading">Oops! Could not fetch joke 😢</span>';
        errorMsg.textContent = `Error: ${error.message}. Please try again.`;
        errorMsg.classList.add('show');
      } finally {
        btn.disabled = false;
      }
    }

    // Allow Enter key to get joke
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        getJoke();
      }
    });
  </script>
</body>
</html>
